name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run version:check
      - run: npm run lint
      # Structural rules encoding bug classes this codebase has actually
      # shipped (see docs in lint-rules/). Cheap, and they never regress.
      - run: npm run lint:rules
      - run: npm run build

  mcp-server:
    # skills-mcp is pure-stdlib Python; it ships to Linux servers but the
    # basin it serves lives on any dev OS, so it runs on the same 3-OS matrix.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m unittest discover -s mcp-server/tests -v

  rust:
    # Upstream only tested on Linux; a whole class of Windows path/manifest bugs
    # shipped unnoticed. SkillBasin tests on every OS we release for.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test (unix)
        if: runner.os != 'Windows'
        run: cargo test --all
      - name: Test (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: .
        run: ./scripts/test-rust.ps1
      # Fleet agent links the headless core (no tauri/webkit), so its tests
      # need no manifest workaround on Windows and no GUI deps anywhere.
      - name: Test hub-agent
        working-directory: hub-agent
        run: cargo test
